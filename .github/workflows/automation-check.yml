# Generated from automation/repo-insight/workflows/definitions.ts
# Do not edit this file directly. Run pnpm automation:generate-workflows.
name: Automation Check
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix develop --command pnpm install --frozen-lockfile
      - run: nix develop --command pnpm automation:check-workflows
      - run: nix develop --command pnpm automation:actionlint
      - run: nix develop --command pnpm typecheck
      - run: nix develop --command pnpm insight:validate
      - run: nix develop --command pnpm lint
