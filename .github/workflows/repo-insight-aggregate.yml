# Generated from automation/repo-insight/workflows/definitions.ts
# Do not edit this file directly. Run pnpm automation:generate-workflows.
name: Repo Insight Aggregate
on:
  schedule:
    - cron: "47 13 * * 0"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
concurrency:
  group: repo-insight-aggregate-${{ github.run_id }}
  cancel-in-progress: false
jobs:
  aggregate:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v15
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'becker63' }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
      - run: nix develop --command pnpm install --frozen-lockfile
      - name: Aggregate insights
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ vars.CURSOR_MODEL }}
        run: nix develop --command pnpm aggregate-insights --ci
