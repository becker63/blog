narrative:
  headline: "Infrastructure and platform engineer who makes complex systems legible, reproducible, and safer to operate"

  exit_story: >-
    My path has moved through electrical grid incident-response software, HPC infrastructure,
    security documentation, technical teaching, Linux/networking research, typed infrastructure,
    and AI evaluation tooling. The common thread is systems translation: I find the seams where
    state, identity, deployment, observability, runtime behavior, or human understanding drift,
    then build artifacts that make the system easier to reason about. I am now targeting roles
    where that ability is the job: platform, infrastructure, security, developer tooling, AI evals,
    and high-context technical solutions work.

  short_pitch: >-
    I build tools that move uncertainty out of people's heads and into inspectable artifacts:
    static graphs, typed configs, reproducible environments, fuzzing harnesses, telemetry traces,
    run bundles, and release-style reports.

  positioning:
    primary_identity: "Systems translator / phase-boundary engineer"
    public_translation: "Platform/security/AI-infra engineer focused on legibility, reproducibility, and release-quality feedback loops"
    avoid_public_framing:
      - "philosophical identity language"
      - "private institutional injury"
      - "uncredentialed genius framing"
      - "too much explanation of personal history"
    preferred_public_framing:
      - "I work well at seams between subsystems"
      - "I make opaque systems easier to reason about"
      - "I build artifacts that reduce ambiguity"
      - "I shift expensive runtime discovery into earlier, inspectable structure"

  superpowers:
    - "Reverse-engineer opaque systems into clear operating models"
    - "Shift expensive runtime uncertainty into earlier, inspectable structure"
    - "Build reproducible local environments for systems that are hard to reason about directly"
    - "Trace correctness and security problems across UI, infrastructure, auth, deployment, serialization, and runtime boundaries"
    - "Design typed, testable interfaces over fragile configuration and infrastructure surfaces"
    - "Write technical artifacts that explain complex system behavior without flattening important details"
    - "Communicate across engineers, operators, students, customers, and non-specialists without losing the technical truth"

  proof_points:
    - name: "SearchBench"
      url: "https://github.com/becker63/searchbench https://github.com/becker63/searchbench-go"
      hero_metric: "Built a deterministic evaluation harness for agentic code-search systems with baseline-vs-candidate comparisons, static-graph scoring, token/cost tracking, telemetry, reproducible run bundles, and promotion-style reports."
      track: "ai-infra"
      use_for:
        - "AI evaluation"
        - "LLMOps"
        - "developer tooling"
        - "agent infrastructure"
        - "platform engineering"
        - "release engineering"

    - name: "AI Agents Need Release Reports, Not Just Traces"
      url: "https://www.becker63.digital/Blogs/ai-release-reports"
      hero_metric: "Defined the product shape for agent-system release reports: baseline, candidate, changed artifacts, score movement, regressions, protected cases, and promotion decisions."
      track: "ai-infra"
      use_for:
        - "AI observability"
        - "agent evals"
        - "Langfuse/LangSmith-adjacent roles"
        - "technical writing"

    - name: "Static Control Plane"
      url: "https://github.com/becker63/designing-for-two"
      hero_metric: "Modeled infrastructure with KCL, Crossplane, Buck2, Nix, generated schemas, and pytest validation to make deployment structure inspectable before runtime."
